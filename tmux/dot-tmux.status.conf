# ~/.tmux.status.conf — dense dotbar status line.
# Sourced from ~/.tmux.conf after nord-tmux loads so these overrides win.
#
# Layout: left/right separators are nerd-font filled circles that swap glyph
# and color when the prefix is held (small  → large ). The window list
# uses a static  between windows; active window is just bold accent text.
# Edge separators are dropped so nothing dangles next to the centered window list.
#
#   work  main*       1:zsh    2:nvim*    3:test       ~/c/dotfiles  85%  14:32
#
# The git segment (separator + glyph + branch) disappears entirely outside a repo.
#
# Helper scripts live in ~/.config/tmux/ (deployed by the tmux stow package).

# ---- Palette (nord) --------------------------------------------------------
# nord0=#2e3440  base bg
# nord3=#4c566a  dim fg (dots, inactive text)
# nord4=#d8dee9  fg
# nord8=#88c0d0  accent (session, active window)
# nord14=#a3be8c green (battery ok / clean git)
# nord13=#ebcb8b yellow (battery warn)
# nord11=#bf616a red (battery low, prefix held)
# nord15=#b48ead purple (prefix held, secondary accent)

# ---- Reusable bits ---------------------------------------------------------
# %hidden lets us name the separator once and reuse it (tmux 3.2+).
# Glyph swaps small->large when the prefix is held; color also flips to purple.
%hidden SEP=" #[fg=#4c566a]#{?client_prefix,#[fg=#b48ead],}#[fg=#d8dee9] "

# ---- Refresh & global ------------------------------------------------------
set -g status-interval 5
set -g status on
set -g status-justify centre
set -g status-style "bg=default,fg=#d8dee9"

# ---- Left: session · git ---------------------------------------------------
# Session name turns purple while prefix is held (matches the dots).
# The git block (separator + branch + bracketed status) is wrapped in an
# `#{!=:..,}` check so it collapses to nothing when not inside a repo.
set -g status-left-length 60
set -g status-left " #[fg=#88c0d0,bold]#{?client_prefix,#[fg=#b48ead],}#S#[default]#{?#{!=:#(~/.config/tmux/git_branch.sh '#{pane_current_path}'),},${SEP}#(~/.config/tmux/git_branch.sh '#{pane_current_path}'),} "

# ---- Window list (middle) --------------------------------------------------
# Inactive windows: bare `idx:name` in dim grey.
# Active window: same shape as inactive, but in the accent color (bold).
# Inter-window separator is a static dim-grey  dot (cannot be made
# prefix-aware because window-status-separator is not format-expanded).
setw -g window-status-separator " #[fg=#4c566a]#[fg=#d8dee9] "
setw -g window-status-format "#[fg=#4c566a]#I:#W#{?window_activity_flag,*,}"
setw -g window-status-current-format "#[fg=#88c0d0,bold]#{?client_prefix,#[fg=#b48ead],}#I:#W#{?window_zoomed_flag,Z,}"

# ---- Right: cwd · battery · time -------------------------------------------
set -g status-right-length 120
set -g status-right " #[fg=#81a1c1]#(~/.config/tmux/shorten_cwd.sh '#{pane_current_path}')${SEP}#[fg=#ebcb8b]#(~/.config/tmux/battery.sh)${SEP}#[fg=#d8dee9]%H:%M "

# ---- Misc styling ----------------------------------------------------------
set -g message-style "fg=#d8dee9,bg=default"
set -g pane-active-border-style "fg=#88c0d0"
set -g pane-border-style "fg=#4c566a"

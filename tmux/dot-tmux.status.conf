# ~/.tmux.status.conf — dense dotbar status line.
# Sourced from ~/.tmux.conf after nord-tmux loads so these overrides win.
#
# Layout (separators are middle-dots that recolor while the prefix is held):
#
#   work · 1:zsh 2:nvim* 3:test · ~/c/dotfiles · main* · 85% · 14:32
#   └ session                                   git    bat   time
#                  └ window list             └ cwd
#
# Helper scripts live in ~/.config/tmux/ (deployed by the tmux stow package).

# ---- Palette (nord) --------------------------------------------------------
# nord0=#2e3440  base bg
# nord3=#4c566a  dim fg (dots, inactive text)
# nord4=#d8dee9  fg
# nord8=#88c0d0  accent (session, active window)
# nord14=#a3be8c green (battery ok / clean git)
# nord13=#ebcb8b yellow (battery warn)
# nord11=#bf616a red (battery low, prefix held)
# nord15=#b48ead purple (prefix held, secondary accent)

# ---- Reusable bits ---------------------------------------------------------
# %hidden lets us name the separator once and reuse it (tmux 3.2+).
# When client_prefix is on, the dot turns purple; otherwise it stays dim.
%hidden SEP=" #[fg=#4c566a]#{?client_prefix,#[fg=#b48ead],}·#[fg=#d8dee9] "

# ---- Refresh & global ------------------------------------------------------
set -g status-interval 5
set -g status on
set -g status-justify left
set -g status-style "bg=default,fg=#d8dee9"

# ---- Left: session name ----------------------------------------------------
# Session name turns purple while prefix is held (matches the dots).
set -g status-left-length 40
set -g status-left " #[fg=#88c0d0,bold]#{?client_prefix,#[fg=#b48ead],}#S#[default]${SEP}"

# ---- Window list (middle) --------------------------------------------------
# Inactive windows: dim. Active: accent + bold. "*" shows activity.
setw -g window-status-separator " "
setw -g window-status-format "#[fg=#4c566a]#I:#W#{?window_activity_flag,*,}"
setw -g window-status-current-format "#[fg=#88c0d0,bold]#I:#W#{?window_zoomed_flag,Z,}"

# ---- Right: cwd · git · battery · time -------------------------------------
# Helper scripts return empty when they have nothing to report; the surrounding
# separators are placed unconditionally for simplicity and visual rhythm.
set -g status-right-length 120
set -g status-right "${SEP}#[fg=#d8dee9]#(~/.config/tmux/shorten_cwd.sh '#{pane_current_path}')${SEP}#[fg=#a3be8c]#(~/.config/tmux/git_branch.sh '#{pane_current_path}')${SEP}#[fg=#ebcb8b]#(~/code/dotfiles-mbp/get_batt.sh)${SEP}#[fg=#d8dee9]%H:%M "

# ---- Misc styling ----------------------------------------------------------
set -g message-style "fg=#d8dee9,bg=default"
set -g pane-active-border-style "fg=#88c0d0"
set -g pane-border-style "fg=#4c566a"

set -g mouse on

# These must be set BEFORE the nord config files are sourced — nord-tmux
# reads them at source time and does not re-read them later.
set -g @nord_tmux_show_status_content "0"
set -g @nord_tmux_no_patched_font "1"

# nord-tmux's loader (nord.tmux) uses ${BASH_SOURCE[0]} and has no shebang,
# so it breaks under zsh. Source the plugin's plain-tmux config files
# directly to sidestep the bash-only loader.
run-shell 'tmux source-file ~/.tmux/plugins/nord-tmux/src/nord.conf'
# run-shell 'tmux source-file ~/.tmux/plugins/nord-tmux/src/nord-status-content.conf'

#        section_separators = { left = '', right = '' },
set -g @plugin "arcticicestudio/nord-tmux"


# Remap prefix from C-b to C-a
unbind C-b
set-option -g prefix C-a
bind a send-prefix

# Options
set -g status-position bottom
set -g default-terminal 'tmux-256color'
set -g terminal-overrides ',xterm-256color:Tc'
set -ga terminal-overrides ',*:Ts=\E]2;:fs=\E\\'

set -g set-titles on
set -g set-titles-string '#{pane_title}'

bind r source-file ~/.tmux.conf

set-option -wg automatic-rename off

unbind-key x
bind-key x kill-pane

bind-key -r H resize-pane -L 1
bind-key -r J resize-pane -D 1
bind-key -r K resize-pane -U 1
bind-key -r L resize-pane -R 1

# List of Plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

setw -g mode-keys vi

setw -g monitor-activity off

# Status bar customization (kept in a separate file for easier iteration).
source-file ~/.tmux.status.conf

# Initialize tpack (This line must be last.)
run 'tpack init'

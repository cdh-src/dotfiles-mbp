set -g mouse on

# Remap prefix from C-b to C-a
unbind C-b
set-option -g prefix C-a
bind a send-prefix

# Options
set -g status-position bottom
set -g default-terminal 'tmux-256color'
set -g terminal-overrides ',xterm-256color:Tc'
set -ga terminal-overrides ',*:Ts=\E]2;:fs=\E\\'

set -g set-titles on
set -g set-titles-string '#{pane_title}'

bind r source-file ~/.tmux.conf

set-option -wg automatic-rename off

unbind-key x
bind-key x kill-pane

bind-key -r H resize-pane -L 1
bind-key -r J resize-pane -D 1
bind-key -r K resize-pane -U 1
bind-key -r L resize-pane -R 1

# List of Plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

setw -g mode-keys vi

setw -g monitor-activity off

# Status bar customization (kept in a separate file for easier iteration).
# The few nord-tmux options we wanted (display-panes, clock-mode,
# message-command styles) are inlined there; the rest of nord-tmux's
# status style is fully overridden, so the plugin itself was dropped.
source-file ~/.tmux.status.conf

# Initialize tpack (This line must be last.)
run 'tpack init'

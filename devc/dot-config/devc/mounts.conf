# devc тАФ standard mounts injected into every `devc up`.
#
# One `--mount` value per line. Blank lines and `# comments` are ignored.
# `$VAR` and `${VAR}` are expanded against the current environment when
# `devc up` parses this file.
#
# Special vars set by `devc up` before parsing:
#   $DEVC_CONTAINER_USER тАФ auto-detected from the devcontainer config
#     (remoteUser тЖТ containerUser тЖТ "vscode" fallback). Override by
#     exporting DEVC_CONTAINER_USER before running `devc up`.
#   $DEVC_CONTAINER_HOME тАФ derived from DEVC_CONTAINER_USER ("root" тЖТ /root,
#     anything else тЖТ /home/$user). Override by exporting DEVC_CONTAINER_HOME.
#
# NOTE: devcontainer CLI's --mount only accepts type/source/target/external тАФ
# the Docker-style `readonly` flag is rejected. Host files in these mounts
# are mounted read/write at the kernel level; safety relies on (a) install.sh
# wiring the host-shared paths read-only into ~/.copilot/ via symlinks to
# specific files only, and (b) Copilot CLI writing back through the rw-shared
# dir below, not through ~/.copilot-host/.

# Obsidian vault тАФ agents inside the container can read/write notes at
# /obsidian. Useful for session logs, primers, etc.
type=bind,source=$HOME/Documents/obsidian-notes,target=/obsidian

# Host Copilot config тАФ auth, settings, skills, cross-session history DB.
# install.sh symlinks specific files into ~/.copilot/ inside the container.
type=bind,source=$HOME/.copilot,target=${DEVC_CONTAINER_HOME}/.copilot-host

# Shared cross-container Copilot data (session-state, command history,
# permissions, logs). All devcontainers share this, isolated from host.
type=bind,source=$HOME/.copilot-devcontainer,target=${DEVC_CONTAINER_HOME}/.copilot-shared

# gh CLI config (so `gh` inside the container is logged in).
type=bind,source=$HOME/.config/gh,target=${DEVC_CONTAINER_HOME}/.config/gh

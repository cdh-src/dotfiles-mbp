# dc — standard mounts injected into every `dc up`.
#
# One `--mount` value per line. Blank lines and `# comments` are ignored.
# `$VAR` and `${VAR}` are expanded against the current environment when
# `dc up` parses this file.
#
# Conventions:
#   - target paths assume the container runs as the `vscode` user
#     (devcontainers' default). If you use a different user, edit targets.
#   - Read-only host data (`readonly`) protects host files from being
#     corrupted by container-side writes.

# Obsidian vault — agents inside the container can read/write notes at
# /obsidian. Useful for session logs, primers, etc.
type=bind,source=$HOME/Documents/obsidian-notes,target=/obsidian

# Host Copilot config — auth, settings, skills, cross-session history DB.
# Mounted read-only; install.sh symlinks specific files into
# ~/.copilot/ inside the container.
type=bind,source=$HOME/.copilot,target=/home/vscode/.copilot-host,readonly

# Shared cross-container Copilot data (session-state, command history,
# permissions, logs). All devcontainers share this, isolated from host.
type=bind,source=$HOME/.copilot-devcontainer,target=/home/vscode/.copilot-shared

# gh CLI config (so `gh` inside the container is logged in). Read-only.
type=bind,source=$HOME/.config/gh,target=/home/vscode/.config/gh,readonly
